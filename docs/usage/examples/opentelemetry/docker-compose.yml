networks:
  renovate:

services:
  # Jaeger
  jaeger:
    image: jaegertracing/all-in-one:1.60.0
    networks:
      renovate:
        # This is the host name used in Prometheus scrape configuration.
        aliases: [spm_metrics_source]
    ports:
      - '16686:16686' # Jaeger UI
      - '4318:4318' # OTLP HTTP
      - '8889:8889' # PROMETHEUS
    volumes:
      - ./jaeger-config.yml:/etc/jaeger/config.yml
    command: ["--config-file", "/etc/jaeger/config.yml"]
    environment:
      PROMETHEUS_SERVER_URL: http://prometheus:9090

  prometheus:
    image: prom/prometheus:v2.54.0
    networks:
        renovate:
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"

  netshoot:
    image: nicolaka/netshoot
    networks:
      renovate:
    command: sleep 3600
    tty: true
    depends_on:
      - jaeger
      - prometheus
